name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Cucumber tests
      run: npm run test:ci
      env:
        ENV: qa
        HEADLESS: true
        VALIDATE_SESSION: true
    
    - name: Generate Allure Report
      if: always()
      run: |
        npm install -g allure-commandline
        allure generate reports/qa/allure-results -o reports/qa/allure-report --clean
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/qa/allure-results/
        retention-days: 7
    
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports/qa/allure-report/
        retention-days: 7
    
    - name: Upload Screenshots, Traces & Videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: reports/qa/runs/
        retention-days: 14
