name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Cucumber tests
      run: npm run test:ci
      env:
        ENV: qa
        HEADLESS: true
        VALIDATE_SESSION: true
        # Environment-specific credentials (use {ENV}_* prefix)
        # These are loaded from GitHub Secrets
        QA_APP_ORG_ID: ${{ secrets.QA_APP_ORG_ID }}
        QA_APP_USERNAME: ${{ secrets.QA_APP_USERNAME }}
        QA_APP_PASSWORD: ${{ secrets.QA_APP_PASSWORD }}
        # Approver credentials (for approval workflows)
        QA_APPROVER_USERNAME: ${{ secrets.QA_APPROVER_USERNAME }}
        QA_APPROVER_PASSWORD: ${{ secrets.QA_APPROVER_PASSWORD }}
        QA_APPROVER_ORG_ID: ${{ secrets.QA_APPROVER_ORG_ID }}
        # Database credentials (optional)
        QA_DB_USER: ${{ secrets.QA_DB_USER }}
        QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
    
    - name: Generate Allure Report
      if: always()
      run: |
        npm install -g allure-commandline
        allure generate reports/qa/allure-results -o reports/qa/allure-report --clean
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/qa/allure-results/
        retention-days: 7
    
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports/qa/allure-report/
        retention-days: 7
    
    - name: Upload Screenshots, Traces & Videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: reports/qa/runs/
        retention-days: 14
